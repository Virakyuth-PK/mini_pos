name: mini_pos
description: "A new Flutter project."

version: 1.0.0+10001

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # AI AGENT
  #  google_gen_ai: ^0.2.0

  # Data Handling
  infinite_scroll_pagination: ^4.1.0
  sunmi_printer_plus: ^4.1.1
  screenshot: ^3.0.0
  dropdown_button2: ^2.3.9
  dropdown_search: ^6.0.2
  json_annotation: ^4.9.0
  json_serializable: ^6.11.0
  hive_ce: ^2.11.3
  hive_ce_flutter: ^2.3.2
  uuid: ^4.5.1
  freezed: ^3.2.0
  freezed_annotation: ^3.1.0
  firebase_core: ^4.9.0

  #Core
  get: ^4.7.3
  #  flutter_secure_storage: ^10.0.0
  device_info_plus: ^13.1.0
  flutter_screenutil: ^5.9.3
  permission_handler: ^12.0.1
  #  encrypt: ^5.0.3
  intl: ^0.20.2
  keyboard_dismisser: ^3.0.0
  url_launcher: ^6.3.2
  package_info_plus: ^10.1.0
  image_picker: ^1.2.1
  connectivity_plus: ^7.0.0
  photo_view: ^0.15.0
  smooth_page_indicator: ^2.0.1
  cupertino_icons: ^1.0.8

  #Decoration
  animate_do: ^4.2.0
  animate_gradient: ^0.0.4
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.3
  toastification: ^3.0.3
  flutter_easyloading: ^3.0.5
  local_auth: ^3.0.0
  syncfusion_flutter_gauges: ^32.2.3
  loading_animation_widget: ^1.3.0
  persistent_bottom_nav_bar: ^6.2.1
  zo_animated_border: ^1.0.6
  loader_overlay: ^5.0.0
  carousel_slider: ^5.1.2
  firebase_ai: ^3.12.1
  auto_size_text: ^3.0.0
  sunmi_flutter_helper: ^0.0.9
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  flutter_flavorizr: ^2.4.1
  flutter_cache_manager: ^3.4.1
  logger: ^2.6.1
  flutter_gen_runner: ^5.11.0
  intl: ^0.20.2
  crypto: ^3.0.6
  hive_ce_generator: ^1.9.3
  auto_mappr: ^2.10.0

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/icon/
    - assets/icon/home/
    - assets/svg/
    - assets/gif/
    - assets/

  fonts:
    - family: custom
      fonts:
        - asset: assets/font/custom/FunkidsRegular-j9yAv.ttf

    - family: Montserrat
      fonts:
        - asset: assets/font/Montserrat/Montserrat-Regular.ttf
        - asset: assets/font/Montserrat/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/font/Montserrat/Montserrat-Italic-VariableFont_wght.ttf
          style: italic

    - family: Krasar
      fonts:
        - asset: assets/font/Krasar/KRASAR-BOLD.TTF
          weight: 700
        - asset: assets/font/Krasar/KRASAR-LIGHT.TTF
        - asset: assets/font/Krasar/KRASAR-MEDIUM.TTF
        - asset: assets/font/Krasar/KRASAR-REGULAR.TTF

    - family: SF Pro Display
      fonts:
        - asset: assets/font/SFPro/SFPRODISPLAYREGULAR.OTF
        - asset: assets/font/SFPro/SFPRODISPLAYBOLD.OTF
          weight: 700
        - asset: assets/font/SFPro/SFPRODISPLAYMEDIUM.OTF
